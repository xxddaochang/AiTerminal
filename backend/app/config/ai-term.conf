# ==============================================================================
# AI-TERM Server Configuration
# ==============================================================================
# 本文件定义服务端运行参数。字段支持 `~` 展开到用户家目录。
# 修改后需要重启服务 (./run.sh) 才能生效。
# ==============================================================================

[database]
# SQLite 数据库文件路径(相对 backend/app/config/ 目录)
db_file=ai-term.db

[rules]
# 规则 Markdown 文件的存储目录
# 推荐使用 ~ 展开,避免硬编码特定用户路径
storage_path=~/.cache/ai-term/rules

# 首次启动时用作 default.md 的模板
default_template=default.md.sample

# 默认规则文件权限 (400 = 只读,仅所有者)
default_file_permission=400

# 用户创建规则文件的默认权限 (600 = 读写,仅所有者)
custom_file_permission=600

[models]
# 默认模型供应商 (参考 config.json.example 的 providers 列表)
# 可选值示例: deepseek | qwen | doubao | openai
default_provider=deepseek

[system]
# 运行时缓存目录 (聊天会话、主题、规则等)
cache_dir=~/.cache/ai-term

# 日志级别: DEBUG | INFO | WARNING | ERROR
log_level=INFO

[agent]
# 当前激活的 Agent 供应商。服务首次启动时会读取该字段。
# 通过前端或 /api/models/activate API 切换时,该值会被自动更新。
active_provider=deepseek
